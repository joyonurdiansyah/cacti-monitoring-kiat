<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/www/html/log/apache_error.log
    CustomLog /var/www/html/log/apache_access.log combined
</VirtualHost>
