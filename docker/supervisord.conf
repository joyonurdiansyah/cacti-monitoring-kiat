[supervisord]
nodaemon=true
user=root
logfile=/var/www/html/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
stopwaitsecs=10
stdout_logfile=/var/www/html/log/apache.log
stderr_logfile=/var/www/html/log/apache_error.log

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
stdout_logfile=/var/www/html/log/cron.log
stderr_logfile=/var/www/html/log/cron_error.log
