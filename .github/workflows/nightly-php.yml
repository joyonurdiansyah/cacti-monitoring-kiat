  docker-smoke:
    name: docker environment smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Make docker smoke script executable
        run: chmod +x tests/tools/check_docker.sh

      - name: Run Docker smoke test
        run: tests/tools/check_docker.sh
