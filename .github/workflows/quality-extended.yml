name: Extended PHP Quality

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-extended-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COMPOSER_ALLOW_SUPERUSER: 1
  COVERAGE_MIN_LINE_PCT: '10.0'

