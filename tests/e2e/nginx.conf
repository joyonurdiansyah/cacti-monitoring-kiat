# nginx vhost for the Cacti E2E stack. Serves the repo from /var/www/html/cacti
# and proxies PHP to the php-fpm service at php:9000.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/cacti;
    index index.php index.html;

    # Map common asset extensions to their correct MIME types. Without
    # this, nginx defaults every response to text/html, which browsers
    # refuse to execute under strict-MIME-type checking.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_max_body_size 16m;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Block access to directories that should never be served directly.
    # include/js and include/themes stay reachable (static assets) so
    # the UI loads. lib/ contains PHP only; deny outright.
    location ~ ^/lib/ {
        deny all;
        return 404;
    }
    location ~ ^/include/(config\.php|global\.php|plugins\.php) {
        deny all;
        return 404;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
